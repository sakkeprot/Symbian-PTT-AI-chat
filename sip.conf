; /etc/asterisk/sip.conf
; Asterisk SIP configuration for PoC AI Proxy
; The proxy listens on :5060 and forwards to Asterisk on :5061

[general]
context=default
allowguest=no
nat=force_rport,comedia
allowoverlap=no
udpbindaddr=0.0.0.0:5061        ; Asterisk listens on 5061 — proxy takes 5060
tcpenable=no
tcpbindaddr=0.0.0.0:5061
transport=udp
disallowed_methods=UPDATE
srvlookup=yes
externaddr=YOUR_PUBLIC_IP        ; <-- replace with your server's public IP
localnet=172.31.0.0/255.255.0.0  ; <-- replace with your VPC/LAN subnet if needed

[authentication]

[basic-options](!)
dtmfmode=rfc2833
context=from-office
type=friend

[natted-phone](!,basic-options)
directmedia=no
host=dynamic

[public-phone](!,basic-options)
directmedia=yes

[my-codecs](!)
disallow=all
allow=ilbc
allow=g729
allow=gsm
allow=g723
allow=ulaw

[ulaw-phone](!)
disallow=all
allow=ulaw

; PoC phone account (Symbian / Nokia E-series)
[symbian]
type=friend
insecure=register
host=dynamic
context=default
disallow=all
allow=ulaw
allow=alaw
allow=gsm
dtmfmode=rfc2833
nat=force_rport,comedia
qualify=no
